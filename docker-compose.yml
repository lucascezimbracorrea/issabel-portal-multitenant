services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: portalroot
      MYSQL_DATABASE: issabel_portal
      MYSQL_USER: portal
      MYSQL_PASSWORD: portaldev
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pportalroot']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  portal-api:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/app
    environment:
      PORT: 8787
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_USER: portal
      DB_PASSWORD: portaldev
      DB_NAME: issabel_portal
    command: sh -lc "cd apps/api && npm install && npm run dev"
    ports:
      - '8787:8787'
